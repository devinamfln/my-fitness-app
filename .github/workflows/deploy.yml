name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    #environments: host=publicip user:ec2username key=private key

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy files to EC2
        run: |
          # This is now one long, single-line command to avoid formatting errors
          scp -i private_key.pem -o StrictHostKeyChecking=no -r backend/ frontend/ requirements.txt ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/my-fitness-app/

      - name: Restart Flask on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ec2-user/my-fitness-app
            # Create venv if it doesn't exist
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt
          
            # Restart the service we created earlier
            sudo systemctl daemon-reload
            sudo systemctl restart flask
            sudo systemctl status flask --no-pager
          EOF


