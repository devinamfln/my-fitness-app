name: CI/CD - Test and Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: TESTING ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --ignore=E,W,F --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest -v

      # --- SECTION 2: INFRASTRUCTURE (TERRAFORM) ---
      # This step uses your new IAM User keys to "log in" to AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve

      # --- SECTION 3: DOCKER DEPLOYMENT ---
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/my-fitness-app
            cd ~/my-fitness-app

            # Get the latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              # Using token-based clone for private repos if needed
              git clone https://github.com/${{ github.repository }} . || git pull origin main
            fi

          
            # Inject both just to be safe, so your app has everything it needs
            echo "CLOUDFLARE_TOKEN=${{ secrets.CLOUDFLARE_TOKEN }}" > .env
            echo "CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" >> .env

            # Start the Docker containers
            # --build ensures it picks up your latest code changes
            docker compose up -d --build
            
            # Cleanup old unused images to save disk space on a small t3.nano
            docker image prune -f