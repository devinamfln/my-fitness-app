name: CI/CD - Test and Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: TESTING ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock flake8 gunicorn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Unit Tests (Mocked)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest backend/test_app.py -v

      - name: Lint with flake8
        run: |
          flake8 . --count --ignore=E,W,F --max-line-length=127 --statistics

      # --- SECTION 2: INFRASTRUCTURE (TERRAFORM) ---
      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Terraform
        if: github.ref == 'refs/heads/main'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        id: tf_apply
        working-directory: ./terraform
        env:
          TF_VAR_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform refresh
          terraform apply -auto-approve
          echo "static_public_ip=$(terraform output -raw static_public_ip)" >> $GITHUB_OUTPUT

      # --- SECTION 3: DEPLOYMENT ---
      - name: Deploy to EC2 via SSH
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.tf_apply.outputs.static_public_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for system..."
            until command -v git &> /dev/null; do sleep 10; done

            sudo mkdir -p /home/ec2-user/my-fitness-app
            sudo chown -R ec2-user:ec2-user /home/ec2-user/my-fitness-app
            cd /home/ec2-user/my-fitness-app

            echo "Cleaning and cloning..."
            rm -rf .git backend frontend terraform requirements.txt flask.service
            git clone https://github.com/${{ github.repository }}.git .

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt

            cd backend
            ../venv/bin/python seed.py
            cd ..

            sudo cp flask.service /etc/systemd/system/flask.service
            sudo systemctl daemon-reload
            sudo systemctl enable flask
            sudo systemctl restart flask
            sudo systemctl status flask --no-pager