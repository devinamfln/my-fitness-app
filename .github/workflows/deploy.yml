name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    #

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Create private key
        run: |
          echo "$EC2_SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

      - name: Debug secrets
        run: |
          # GitHub masks secrets in logs, so you will see *** instead of values
          # But this proves the variables are no longer empty
          echo "EC2_HOST length: ${#EC2_HOST}"
          echo "EC2_USER length: ${#EC2_USER}"
      

      - name: Copy backend + frontend to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no -r \
            backend/ frontend/ requirements.txt \
            $EC2_USER@$EC2_HOST:/home/$EC2_USER/my-fitness-app/

      - name: Restart Flask on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
            cd ~/my-fitness-app
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
          
            sudo systemctl restart flask
            sudo systemctl status flask --no-pager
          EOF


