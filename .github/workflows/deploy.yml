name: CI/CD - Test and Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: TESTING ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --ignore=E,W,F --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest -v

      # --- SECTION 2: DOCKER DEPLOYMENT ---
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/my-fitness-app
            cd ~/my-fitness-app

            # Get the latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

            # Inject the Cloudflare token into the .env file
            echo "CLOUDFLARE_TOKEN=${{ secrets.CLOUDFLARE_TOKEN }}" > .env

            # Start the Docker containers
            docker compose up -d --build
            
            # Cleanup old unused images to save disk space
            docker image prune -f