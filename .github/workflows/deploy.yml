name: CI/CD - Test and Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: TESTING ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --ignore=E,W,F --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest -v || echo "No tests found yet"

      # --- SECTION 2: INFRASTRUCTURE (TERRAFORM) ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        id: tf_apply
        working-directory: ./terraform
        env:
          TF_VAR_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform refresh
          terraform apply -auto-approve
          echo "static_public_ip=$(terraform output -raw static_public_ip)" >> $GITHUB_OUTPUT

      # --- SECTION 3: DEPLOYMENT ---
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.tf_apply.outputs.static_public_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # 1. Wait for System Initialization
            echo "Waiting for system initialization..."
            until command -v git &> /dev/null; do
              echo "Git not found yet. Sleeping for 10 seconds..."
              sleep 10
            done

            # 2. Setup Directory
            sudo mkdir -p /home/ec2-user/my-fitness-app
            sudo chown -R ec2-user:ec2-user /home/ec2-user/my-fitness-app
            cd /home/ec2-user/my-fitness-app

            # 3. Handle the Code
            if [ ! -d ".git" ]; then
              echo "Fresh setup: Cloning repository..."
              find . -maxdepth 1 ! -name 'venv' ! -name '.' -exec rm -rf {} +
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Updating existing code..."
              git fetch --all
              git reset --hard origin/main
            fi

            # 4. Setup Python and Install Requirements
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            ./venv/bin/pip install --upgrade pip

            if [ -f "requirements.txt" ]; then
              ./venv/bin/pip install -r requirements.txt
            fi

            # 5. Seed the Database
            cd backend
            ../venv/bin/python seed.py

            # 6. Systemd Refresh and Restart
            sudo systemctl daemon-reload
            sudo systemctl enable flask
            sudo systemctl restart flask

            # 7. Final status check
            sudo systemctl status flask --no-pager