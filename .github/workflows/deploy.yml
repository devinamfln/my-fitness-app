name: CI/CD - Test and Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: TESTING ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
          run: |
            # We ignore all style/whitespace/import errors (E, W, F) so you can deploy
            flake8 . --count --ignore=E,W,F --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          # This runs the database test you wrote
          pytest -v

      # --- SECTION 2: DEPLOYMENT (Only runs if Section 1 passes) ---
      - name: Create private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy files to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no -r \
            backend/ frontend/ requirements.txt \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/my-fitness-app/

      - name: Restart Flask on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ec2-user/my-fitness-app
            # Create venv if it doesn't exist
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt
          
            sudo systemctl daemon-reload
            sudo systemctl restart flask
            sudo systemctl status flask --no-pager
          EOF