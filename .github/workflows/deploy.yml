name: CI/CD - Test and Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- SECTION 1: TESTING ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --ignore=E,W,F --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest -v || echo "No tests found yet"

      # --- SECTION 2: INFRASTRUCTURE (TERRAFORM) ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # Crucial for getting raw outputs easily

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        id: tf_apply
        working-directory: ./terraform
        env:
          TF_VAR_tunnel_token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform apply -auto-approve
          # This captures the IP from your main.tf output and stores it in GITHUB_OUTPUT
          echo "static_public_ip=$(terraform output -raw static_public_ip)" >> $GITHUB_OUTPUT

      # --- SECTION 3: DEPLOYMENT ---
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          # This pulls the IP from the 'tf_apply' step output automatically!
          host: ${{ steps.tf_apply.outputs.static_public_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            # 1. Take ownership of the base folder
            sudo chown -R ec2-user:ec2-user /home/ec2-user/my-fitness-app
            
            # 2. Go to the project root
            cd /home/ec2-user/my-fitness-app
            
            # 3. Handle the Code (Improved Clone/Pull)
            if [ ! -d ".git" ]; then
              echo "Fresh setup: Cloning repository..."
              # Clean out everything EXCEPT the venv if it exists
              find . -maxdepth 1 ! -name 'venv' ! -name '.' -exec rm -rf {} +
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Existing setup: Pulling latest changes..."
              git fetch --all
              git reset --hard origin/main
            fi
            
            # 4. Update Python environment
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # Navigate to backend to install specific requirements
            cd backend
            ../venv/bin/pip install --upgrade pip
            if [ -f "requirements.txt" ]; then
              ../venv/bin/pip install -r requirements.txt
            else
              ../venv/bin/pip install flask
            fi
            
            # 5. Systemd Refresh and Restart
            sudo systemctl daemon-reload
            sudo systemctl enable flask
            sudo systemctl restart flask
            
            # 6. Final status check
            sudo systemctl status flask --no-pager