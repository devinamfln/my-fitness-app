name: Python CI

on:
  push:
    branches:
      - main
      - feature/network-fix    #allows tests on feature branch
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Python files
        run: |
          pip install flake8
          #Ignore some common style warnings during the early development stage
          flake8 backend --ignore E501,E1,E2,E3,W2,W3


      - name: Run basic syntax test
        run: |
          python -m py_compile backend/*.py

  terraform-plan:
    runs-on: ubuntu-latest
    needs: python-ci        # only run if Python job passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
