name: Python CI

on:
  push:
    branches:
      - main
      - feature/network-fix    #allows tests on feature branch
  pull_request:
    branches: [ "main" ]

# Required: Add permissions block for OIDC token request
permissions:
  id-token: write #Allows requesting the OIDC token request
  contents: read #Allows checking out teh code

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Python files
        run: |
          pip install flake8
          #Ignore some common style warnings during the early development stage
          flake8 backend --ignore E501,E1,E2,E3,W2,W3


      - name: Run basic syntax test
        run: |
          python -m py_compile backend/*.py

  terraform-plan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #2. Add AWS Credentials Configuration using your specific OIDC Role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          #arn specific IAM role
          role-to-assume: arn:aws:iam::573283487310:role/GitHubActions-Terraform-Role
          aws-region: eu-north-1
          role-session-name: GitHubActions-Terraform-Plan-Session

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan
